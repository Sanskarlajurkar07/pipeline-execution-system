<!DOCTYPE html>
<html>
<head>
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Spring Boot Backend Connection Test</h1>
    
    <button onclick="testHealth()">Test Health Endpoint</button>
    <button onclick="testParse()">Test Parse Endpoint</button>
    <button onclick="testRun()">Test Run Endpoint</button>
    
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://localhost:8080';
        
        function showResult(message, isSuccess) {
            const div = document.createElement('div');
            div.className = 'result ' + (isSuccess ? 'success' : 'error');
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }
        
        async function testHealth() {
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                showResult(`✅ Health Check: ${JSON.stringify(data)}`, true);
            } catch (error) {
                showResult(`❌ Health Check Failed: ${error.message}`, false);
            }
        }
        
        async function testParse() {
            try {
                const payload = {
                    nodes: [
                        {id: "input1", type: "customInput", data: {}},
                        {id: "output1", type: "customOutput", data: {}}
                    ],
                    edges: [
                        {source: "input1", target: "output1"}
                    ]
                };
                const response = await fetch(`${API_URL}/pipelines/parse`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                showResult(`✅ Parse: ${JSON.stringify(data)}`, true);
            } catch (error) {
                showResult(`❌ Parse Failed: ${error.message}`, false);
            }
        }
        
        async function testRun() {
            try {
                const payload = {
                    nodes: [
                        {id: "input1", type: "customInput", data: {}},
                        {id: "text1", type: "text", data: {text: "Hello {{name}}!"}},
                        {id: "output1", type: "customOutput", data: {}}
                    ],
                    edges: [
                        {source: "input1", target: "text1", sourceHandle: "value", targetHandle: "text1-name"},
                        {source: "text1", target: "output1", sourceHandle: "output", targetHandle: "input"}
                    ],
                    inputs: {
                        input1: "World"
                    }
                };
                const response = await fetch(`${API_URL}/pipelines/run`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                showResult(`✅ Run: ${JSON.stringify(data).substring(0, 200)}...`, true);
            } catch (error) {
                showResult(`❌ Run Failed: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
