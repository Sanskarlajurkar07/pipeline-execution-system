spring:
  application:
    name: pipeline-backend
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.0-flash
            temperature: 0.7
            max-output-tokens: 2048

server:
  port: 8080

logging:
  level:
    com.vectorshift: INFO
    org.springframework.ai: DEBUG
